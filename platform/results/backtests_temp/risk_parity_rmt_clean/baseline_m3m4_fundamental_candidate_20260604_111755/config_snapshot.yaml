platform:
  run_name: baseline_m3m4_fundamental_candidate
data:
  source: finshare
  fetch: false
  data_dir: data
  market_store_dir: null
  fundamentals_dir: data/platform_fundamentals
  fundamental_fields:
  - pe
  - pb
  - roe
  - debt_to_asset
  - dividend_yield
assets:
- asset_id: CN_ETF:510300.SH
  code: '510300'
  name: 沪深300ETF
  asset_type: etf
  exchange: SH
  currency: CNY
  lot_size: 100
  price_limit_pct: 0.1
- asset_id: CN_ETF:518880.SH
  code: '518880'
  name: 黄金ETF
  asset_type: etf
  exchange: SH
  currency: CNY
  lot_size: 100
  price_limit_pct: 0.1
- asset_id: CN_ETF:511260.SH
  code: '511260'
  name: 十年国债ETF
  asset_type: etf
  exchange: SH
  currency: CNY
  lot_size: 100
  price_limit_pct: 0.1
portfolio:
  initial_cash: 1000000.0
  initial_equity: 1000000.0
  initial_positions: []
backtest:
  start_date: '2017-08-24'
  end_date: '2026-06-01'
  enable_checkpoints: false
execution:
  price_field: close
  weight_tolerance: 0.0005
  unfilled_policy: retry_next_day
  fee:
    rate: 0.0002
    min_fee: 5.0
strategies:
  segments:
  - start_date: '2017-08-24'
    end_date: null
    strategy_name: risk_parity_rmt_clean
    strategy_version_id: null
    cancel_pending_on_start: false
    params:
      rebalance_frequency: monthly
      cooldown_days: 20
      universe:
      - CN_ETF:510300.SH
      - CN_ETF:518880.SH
      - CN_ETF:511260.SH
      fundamental_rules:
        required:
        - pe
        - pb
        max:
          pe: 30
          pb: 5
        min:
          roe: 0
        sort_by: dividend_yield
        descending: true
        limit: 3
output:
  results_dir: results/backtests
  sim_dir: results/sim_portfolios
