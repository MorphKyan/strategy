# 基线：同篮子月度等权（与 r8_permanent_real_fixed_weight_threshold.yaml 构成
# "日历触发 vs 阈值触发"的干净对照——同资产、同费用、同目标权重）。
platform:
  run_name: r8_permanent_real_equal_weight_monthly
data:
  data_dir: data
assets:
- asset_id: CN_ETF:510300.SH
  code: '510300'
  name: 沪深300ETF
  asset_type: etf
  exchange: SH
  currency: CNY
  lot_size: 100
  price_limit_pct: 0.1
- asset_id: CN_ETF:511260.SH
  code: '511260'
  name: 十年国债ETF
  asset_type: etf
  exchange: SH
  currency: CNY
  lot_size: 100
  price_limit_pct: 0.1
- asset_id: CN_ETF:518880.SH
  code: '518880'
  name: 黄金ETF
  asset_type: etf
  exchange: SH
  currency: CNY
  lot_size: 100
  price_limit_pct: 0.1
- asset_id: CN_ETF:512890.SH
  code: '512890'
  name: 红利低波ETF
  asset_type: etf
  exchange: SH
  currency: CNY
  lot_size: 100
  price_limit_pct: 0.1
portfolio:
  initial_cash: 1000000.0
  initial_equity: 1000000.0
  initial_positions: []
backtest:
  enable_checkpoints: false
execution:
  round_mode: round
  price_field: close
  weight_tolerance: 0.0005
  unfilled_policy: retry_next_day
  fee:
    rate: 0.0002
    min_fee: 5.0
output:
  results_dir: results/backtests
strategy:
  strategy_name: monthly_equal_weight
  strategy_version_id: null
  cancel_pending_on_start: false
  params:
    rebalance_on_start: true
    cooldown_days: 0
    universe:
    - CN_ETF:510300.SH
    - CN_ETF:511260.SH
    - CN_ETF:518880.SH
    - CN_ETF:512890.SH
