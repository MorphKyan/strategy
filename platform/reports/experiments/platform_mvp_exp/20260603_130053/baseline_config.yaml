platform:
  run_name: "platform_mvp"

data:
  data_dir: "data"

assets:
  - asset_id: "CN_ETF:510300.SH"
    code: "510300"
    name: "沪深300ETF"
    asset_type: "etf"
    exchange: "SH"
    currency: "CNY"
    lot_size: 100
    price_limit_pct: 0.10
  - asset_id: "CN_ETF:518880.SH"
    code: "518880"
    name: "黄金ETF"
    asset_type: "etf"
    exchange: "SH"
    currency: "CNY"
    lot_size: 100
    price_limit_pct: 0.10
  - asset_id: "CN_ETF:511260.SH"
    code: "511260"
    name: "十年国债ETF"
    asset_type: "etf"
    exchange: "SH"
    currency: "CNY"
    lot_size: 100
    price_limit_pct: 0.10

portfolio:
  initial_cash: 1000000.0
  initial_equity: 1000000.0
  initial_positions: []

backtest:
  start_date: "2014-01-01"
  end_date: "2015-12-31"
  enable_checkpoints: false

execution:
  price_field: "close"
  weight_tolerance: 0.0005
  unfilled_policy: "retry_next_day"
  fee:
    rate: 0.0002
    min_fee: 5.0

strategies:
  segments:
    - start_date: "2014-01-01"
      end_date: "2014-12-31"
      strategy_name: "monthly_equal_weight"
      strategy_version_id: null
      cancel_pending_on_start: false
      params:
        rebalance_on_start: true
        cooldown_days: 20
        universe:
          - "CN_ETF:510300.SH"
          - "CN_ETF:518880.SH"
          - "CN_ETF:511260.SH"
    - start_date: "2015-01-01"
      end_date: null
      strategy_name: "monthly_equal_weight"
      strategy_version_id: null
      cancel_pending_on_start: false
      params:
        rebalance_on_start: true
        cooldown_days: 20
        universe:
          - "CN_ETF:510300.SH"
          - "CN_ETF:518880.SH"

output:
  results_dir: "results/backtests"
