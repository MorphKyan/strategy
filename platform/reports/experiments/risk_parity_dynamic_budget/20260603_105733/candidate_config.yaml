platform:
  run_name: "platform_risk_parity_dynamic_budget"

data:
  data_dir: "data"

assets:
  - asset_id: "CN_ETF:510300.SH"
    code: "510300"
    name: "沪深300ETF"
    asset_type: "etf"
    exchange: "SH"
    currency: "CNY"
    lot_size: 100
    price_limit_pct: 0.10
  - asset_id: "CN_ETF:518880.SH"
    code: "518880"
    name: "黄金ETF"
    asset_type: "etf"
    exchange: "SH"
    currency: "CNY"
    lot_size: 100
    price_limit_pct: 0.10
  - asset_id: "CN_ETF:511260.SH"
    code: "511260"
    name: "十年国债ETF"
    asset_type: "etf"
    exchange: "SH"
    currency: "CNY"
    lot_size: 100
    price_limit_pct: 0.10

portfolio:
  initial_cash: 1000000.0
  initial_equity: 1000000.0
  initial_positions: []

backtest:
  start_date: "2017-08-24"
  end_date: "2026-05-19"
  enable_checkpoints: false

execution:
  price_field: "close"
  weight_tolerance: 0.0005
  unfilled_policy: "retry_next_day"
  fee:
    rate: 0.0002
    min_fee: 5.0

strategies:
  segments:
    - start_date: "2017-08-24"
      end_date: null
      strategy_name: "risk_parity_dynamic_budget"
      strategy_version_id: null
      cancel_pending_on_start: false
      params:
        rolling_window: 120
        min_periods: 20
        rebalance_threshold: 0.05
        init_mode: "calculate"
        init_calc_days: 30
        momentum_window: 60
        momentum_sensitivity: 1.5
        volatility_target: 0.08
        momentum_type: "return"
        max_leverage: 1.0
        budget_min: 0.1
        universe:
          - "CN_ETF:510300.SH"
          - "CN_ETF:518880.SH"
          - "CN_ETF:511260.SH"

output:
  results_dir: "results/backtests"
