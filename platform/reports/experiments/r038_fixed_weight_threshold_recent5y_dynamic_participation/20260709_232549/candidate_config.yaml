# 候选：固定权重 + 5/25 阈值带再平衡（永久组合式，R038）。
# 篮子为全部真实可交易 ETF（无合成资产），用于实盘跟投。
# 对照基线：r8_permanent_real_equal_weight_monthly.yaml（同篮子同费用，仅触发机制不同）。
platform:
  run_name: r8_permanent_real_fixed_weight_threshold
data:
  data_dir: data
assets:
- asset_id: CN_ETF:510300.SH
  code: '510300'
  name: 沪深300ETF
  asset_type: etf
  exchange: SH
  currency: CNY
  lot_size: 100
  price_limit_pct: 0.1
- asset_id: CN_ETF:511260.SH
  code: '511260'
  name: 十年国债ETF
  asset_type: etf
  exchange: SH
  currency: CNY
  lot_size: 100
  price_limit_pct: 0.1
- asset_id: CN_ETF:518880.SH
  code: '518880'
  name: 黄金ETF
  asset_type: etf
  exchange: SH
  currency: CNY
  lot_size: 100
  price_limit_pct: 0.1
- asset_id: CN_ETF:512890.SH
  code: '512890'
  name: 红利低波ETF
  asset_type: etf
  exchange: SH
  currency: CNY
  lot_size: 100
  price_limit_pct: 0.1
portfolio:
  initial_cash: 1000000.0
  initial_equity: 1000000.0
  initial_positions: []
backtest:
  enable_checkpoints: false
execution:
  round_mode: round
  price_field: close
  weight_tolerance: 0.0005
  unfilled_policy: retry_next_day
  fee:
    rate: 0.0002
    min_fee: 5.0
output:
  results_dir: results/backtests
strategy:
  strategy_name: fixed_weight_threshold
  strategy_version_id: null
  cancel_pending_on_start: false
  params:
    abs_band: 0.05
    rel_band: 0.25
    cooldown_days: 0
    universe:
    - CN_ETF:510300.SH
    - CN_ETF:511260.SH
    - CN_ETF:518880.SH
    - CN_ETF:512890.SH
