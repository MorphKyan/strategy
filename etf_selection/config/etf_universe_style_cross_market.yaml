selection:
  train_end_date: '2025-06-30'
  test_start_date: '2025-07-01'
  min_history_years: 3
  top_k_per_sleeve: 3
  max_baskets: 30
  required_sleeves: ["gold", "hs300", "bond"]
  optional_sleeves: ["dividend", "low_vol", "cross_market_equity", "commodity"]
  commodity:
    prefer_broad: true
    min_single_commodity_count: 2
    max_single_commodity_count: 3
  scoring:
    sleeve:
      history: 0.25
      liquidity: 0.25
      representative_corr: 0.20
      data_quality: 0.15
      volatility_sanity: 0.15
    basket:
      common_history: 0.30
      cross_correlation: 0.30
      concentration: 0.20
      liquidity: 0.10
      sleeve_coverage: 0.10

paths:
  data_dir: "platform/data"
  platform_base_config: "platform/configs/baseline_r1_domestic_rolling.yaml"
  generated_config_dir: "etf_selection/generated_configs"
  report_dir: "etf_selection/reports"
  platform_experiment_script: "platform/scripts/run_platform_experiment.py"

