# 风险平价策略配置 - 6标的自定义组合
strategy:
  name: "risk_parity"
  params:
    rolling_window: 120
    rebalance_threshold: 0.05
    commission: 0.0002
    init_mode: "calculate"        # 支持 "manual" (手动指派) 或 "calculate" (计算后建仓)
    init_calc_days: 30        # "calculate" 模式下建仓前的观察期

backtest:
  assets:
    - code: "510300"
      name: "沪深300ETF"
    - code: "518880"
      name: "黄金ETF"
    - code: "510880"
      name: "华泰柏瑞红利ETF"
    - code: "512890"
      name: "华泰柏瑞红利低波ETF"
  start_date: "2010-01-01"
  end_date: null

output:
  results_dir: "results"
  save_plots: true
  save_csv: true
